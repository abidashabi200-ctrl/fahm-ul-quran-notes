<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مفرد و مرکب — فلیش کارڈز | Fahm-ul-Qur'an</title>

<!-- Open Graph / LinkedIn preview -->
<meta property="og:type" content="website">
<meta property="og:title" content="مفرد و مرکب — Interactive Flashcards & Quiz | Fahm-ul-Qur'an">
<meta property="og:description" content="Fasiha Online Academy's interactive tool to learn Quranic Arabic grammar — flip flashcards, take quizzes, and track your score.">
<meta property="og:image" content="https://abidashabi200-ctrl.github.io/fahm-ul-quran-notes/preview-card.png">
<meta property="og:url" content="https://abidashabi200-ctrl.github.io/fahm-ul-quran-notes/">

<!-- Twitter Card (also used by some previewers) -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="مفرد و مرکب — Interactive Flashcards & Quiz | Fahm-ul-Qur'an">
<meta name="twitter:description" content="Fasiha Online Academy's interactive tool to learn Quranic Arabic grammar — flip flashcards, take quizzes, and track your score.">
<meta name="twitter:image" content="https://abidashabi200-ctrl.github.io/fahm-ul-quran-notes/preview-card.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400..700&family=Gulzar&family=Caveat:wght@600;700&display=swap');

  :root{
    --paper:#fbf4e6;
    --ink:#233142;
    --coral:#e0654a;
    --teal:#1f8a83;
    --mustard:#e2a530;
    --lavender:#8a6bb0;
    --rose:#c9506b;
    --green:#3aa66b;
    --red:#d1483f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; padding:18px; background:#dfe7e0;
    font-family:'Noto Nastaliq Urdu','Gulzar',serif;
    color:var(--ink);
  }
  .wrap{ max-width:920px; margin:0 auto; }

  h1.title{
    text-align:center; font-size:2.2em; color:var(--coral); margin:6px 0 2px;
  }
  .subtitle{
    text-align:center; font-family:'Caveat',cursive; direction:ltr; color:var(--teal);
    font-size:1.3em; margin:0 0 14px;
  }

  /* ---- sticky search + index ---- */
  .toolbar{
    position:sticky; top:8px; z-index:20;
    background:#fffdf7; border:2.5px solid var(--lavender); border-radius:14px;
    padding:10px 14px; box-shadow:3px 5px 0 rgba(0,0,0,.08); margin-bottom:18px;
  }
  .search-row{ display:flex; gap:8px; align-items:center; margin-bottom:8px;}
  .search-row input{
    flex:1; padding:9px 12px; border-radius:10px; border:2px solid var(--teal);
    font-family:inherit; font-size:1.05em; background:#fff; color:var(--ink);
  }
  .search-row input:focus{ outline:2px solid var(--coral); }
  .search-icon{ font-size:1.3em; }
  .index-chips{ display:flex; flex-wrap:wrap; gap:6px; }
  .chip{
    cursor:pointer; border:none; padding:5px 12px; border-radius:20px;
    background:#eef2ea; color:var(--ink); font-family:inherit; font-size:0.95em;
    border:1.5px solid var(--teal); transition:transform .15s;
  }
  .chip:hover{ background:var(--teal); color:#fff; transform:translateY(-2px); }

  /* ---- progress ---- */
  .progress-wrap{ margin-bottom:16px; }
  .progress-label{ font-family:'Caveat',cursive; direction:ltr; color:var(--rose); font-size:1.1em; margin-bottom:4px; display:block; }
  .progress-bar{ height:16px; border-radius:10px; background:#e5ded0; overflow:hidden; border:2px solid var(--mustard); }
  .progress-fill{ height:100%; width:0%; background:linear-gradient(90deg,var(--teal),var(--green)); transition:width .4s ease; }

  section{ margin-bottom:26px; }
  h2.sec-title{
    color:var(--coral); font-size:1.5em; border-bottom:3px dotted var(--coral);
    display:inline-block; padding-bottom:4px; margin-bottom:14px;
  }

  /* ---- flashcards grid ---- */
  .cards-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:16px; }
  .flashcard{
    position:relative; border-radius:14px; min-height:190px;
    perspective:1000px; scroll-margin-top:120px;
  }
  .flashcard.hidden-by-search{ display:none; }
  .card-inner{
    position:relative; width:100%; height:100%; min-height:190px;
    transform-style:preserve-3d; transition:transform .6s;
    border-radius:14px;
  }
  .flashcard.flipped .card-inner{ transform:rotateY(180deg); }
  .card-face{
    position:absolute; inset:0; backface-visibility:hidden;
    border-radius:14px; padding:16px; display:flex; flex-direction:column;
    justify-content:center; align-items:center; text-align:center;
    border:2.5px solid var(--c,var(--teal)); box-shadow:3px 4px 0 rgba(0,0,0,.08);
  }
  .card-front{ background:#fffdf7; }
  .card-back{ background:#fdf6ec; transform:rotateY(180deg); }
  .card-front .term{ font-size:1.6em; font-weight:700; color:var(--c,var(--teal)); }
  .card-back .def{ font-size:1.05em; line-height:1.9; }
  .card-back .example{ margin-top:6px; font-size:1.05em; color:var(--lavender); font-family:'Gulzar',serif; font-weight:700; }

  .flip-btn{
    margin-top:12px; border:none; border-radius:20px; padding:6px 18px;
    background:var(--c,var(--teal)); color:#fff; font-family:inherit; font-size:0.95em;
    cursor:pointer;
  }
  .flip-btn.blink{ animation:pulseGlow 1.4s ease-in-out infinite; }
  @keyframes pulseGlow{
    0%,100%{ box-shadow:0 0 0 0 rgba(224,101,74,.55); }
    50%{ box-shadow:0 0 0 9px rgba(224,101,74,0); }
  }

  .mastery-row{ display:flex; gap:8px; margin-top:10px; }
  .m-btn{
    border:none; border-radius:10px; padding:5px 12px; font-family:inherit;
    font-size:.92em; cursor:pointer;
  }
  .m-yes{ background:var(--green); color:#fff; }
  .m-no{ background:#eee; color:var(--ink); border:1.5px solid #ccc; }
  .flashcard.mastered .card-front{ border-color:var(--green); }
  .flashcard.mastered .card-front::after{
    content:"✔ یاد ہو گیا"; position:absolute; top:8px; left:8px;
    background:var(--green); color:#fff; font-size:.75em; padding:2px 8px; border-radius:10px;
  }

  /* ---- quiz ---- */
  .quiz-box{
    background:#fffdf7; border:2.5px solid var(--teal); border-radius:14px;
    padding:16px 18px; margin-bottom:16px; box-shadow:3px 4px 0 rgba(0,0,0,.07);
    scroll-margin-top:120px;
  }
  .quiz-box.hidden-by-search{ display:none; }
  .q-text{ font-size:1.15em; margin-bottom:10px; }
  .opts{ list-style:none; padding:0; margin:0; display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .opt-btn{
    text-align:right; padding:8px 12px; border-radius:10px; border:2px solid #cdbfa0;
    background:#fff; font-family:inherit; font-size:1em; cursor:pointer; color:var(--ink);
  }
  .opt-btn.correct{ background:var(--green); color:#fff; border-color:var(--green); }
  .opt-btn.wrong{ background:var(--red); color:#fff; border-color:var(--red); }
  .opt-btn[disabled]{ cursor:default; }
  .explain{
    display:none; margin-top:10px; padding:10px 12px; border-radius:10px;
    background:#f3ecd9; border-inline-start:4px solid var(--mustard); font-size:1em; line-height:1.8;
  }
  .explain.show{ display:block; }

  .score-tag{
    display:inline-block; margin-inline-start:8px; padding:2px 12px; border-radius:14px;
    font-size:.9em; font-weight:700; vertical-align:middle;
  }
  .score-tag.right{ background:var(--green); color:#fff; }
  .score-tag.wrong{ background:var(--red); color:#fff; }
  .score-tag.done{ background:var(--lavender); color:#fff; }

  .section-score{
    float:left; font-family:'Caveat',cursive; direction:ltr; font-size:1.25em;
    color:var(--rose); background:#fdf1d6; padding:3px 14px; border-radius:16px;
    border:2px solid var(--mustard);
  }

  .blank-btn{
    display:inline-block; min-width:130px; padding:3px 10px; border-radius:8px;
    border:2px dashed var(--lavender); background:#fbf7ff; color:var(--lavender);
    font-family:inherit; font-size:1em; cursor:pointer; font-weight:700;
  }
  .blank-btn.revealed{
    border-style:solid; background:var(--lavender); color:#fff;
  }

  /* ---- congrats overlay ---- */
  .overlay{
    position:fixed; inset:0; background:rgba(35,49,66,.55); display:none;
    align-items:center; justify-content:center; z-index:100;
  }
  .overlay.show{ display:flex; }
  .congrats-card{
    background:#fffdf7; border-radius:20px; padding:32px 40px; text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,.35); max-width:380px;
  }
  .congrats-card h3{ color:var(--coral); font-size:1.8em; margin:0 0 8px; }
  .congrats-card p{ font-size:1.1em; margin:0 0 16px; }
  .congrats-card button{
    border:none; background:var(--teal); color:#fff; padding:9px 22px;
    border-radius:20px; font-family:inherit; font-size:1em; cursor:pointer;
  }
  .confetti{
    position:fixed; top:-20px; width:10px; height:16px; z-index:99;
    animation:fall linear forwards;
  }
  @keyframes fall{
    to{ transform:translateY(105vh) rotate(540deg); opacity:.3; }
  }

  .footer-note{
    text-align:center; font-family:'Caveat',cursive; direction:ltr;
    color:var(--rose); font-size:1.15em; margin-top:10px;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1 class="title">مفرد و مرکب — فلیش کارڈز</h1>
  <div class="subtitle">Fahm-ul-Qur'an • Tap, Flip, Learn</div>

  <div class="toolbar">
    <div class="search-row">
      <span class="search-icon">🔍</span>
      <input id="searchInput" type="text" placeholder="لفظ تلاش کریں... جیسے مفرد، حکماً، حروفِ جارہ">
    </div>
    <div class="index-chips" id="indexChips"></div>
  </div>

  <div class="progress-wrap">
    <span class="progress-label">Flashcards mastered</span>
    <div class="progress-bar"><div class="progress-fill" id="cardProgress"></div></div>
  </div>

  <section id="flashSection">
    <h2 class="sec-title">🃏 فلیش کارڈز</h2>
    <div class="cards-grid" id="cardsGrid"></div>
  </section>

  <div class="progress-wrap">
    <span class="progress-label">Quiz progress</span>
    <div class="progress-bar"><div class="progress-fill" id="quizProgress"></div></div>
  </div>

  <section id="quizSection">
    <h2 class="sec-title">🧠 مشق — MCQs</h2>
    <span class="section-score" id="mcqScore">Score: 0 / 5</span>
    <div style="clear:both"></div>
    <div id="mcqContainer"></div>

    <h2 class="sec-title">✍️ مشق — خالی جگہ پُر کریں</h2>
    <span class="section-score" id="blankScore">Score: 0 / 5</span>
    <div style="clear:both"></div>
    <div id="blankContainer"></div>
  </section>

  <div class="footer-note">✦ Fasiha Online Academy — Interactive Practice ✦</div>
</div>

<div class="overlay" id="overlay">
  <div class="congrats-card">
    <h3 id="congratsTitle">🎉 مبارک ہو!</h3>
    <p id="congratsText"></p>
    <button onclick="closeOverlay()">ٹھیک ہے</button>
  </div>
</div>

<script>
/* ---------------- DATA ---------------- */
const flashcards = [
  {id:"mufrad", term:"مفرد", color:"var(--coral)", def:"اکیلا لفظ جو ایک مکمل معنی بتائے۔", example:"مثال: رسول"},
  {id:"kalima", term:"کلمہ", color:"var(--teal)", def:"مفرد کا دوسرا نام۔", example:"مثال: قلم"},
  {id:"murakkab", term:"مرکب", color:"var(--lavender)", def:"دو یا زیادہ کلموں کو جوڑ کر بنایا گیا لفظ۔", example:"مثال: زید قائم"},
  {id:"kalam", term:"کلام", color:"var(--mustard)", def:"مرکب کا دوسرا نام۔", example:"مثال: زید قائم (بطور کلام)"},
  {id:"haqiqatan", term:"حقیقتاً", color:"var(--rose)", def:"دونوں کلمے ظاہری طور پر لکھے ہوں۔", example:"مثال: خالد کاتب"},
  {id:"hukman", term:"حکماً", color:"var(--coral)", def:"ایک کلمہ پوشیدہ ہو، معنی میں موجود ہو۔", example:"مثال: اِصْبِرْ"},
  {id:"zameer", term:"ضمیرِ مستتر", color:"var(--teal)", def:"چھپی ہوئی ضمیر جو لکھی نہیں جاتی۔", example:"مثال: اِعْلَمْ میں \"اَنْتَ\""},
  {id:"murakkabat", term:"مرکبات (نورانی قاعدہ)", color:"var(--lavender)", def:"بغیر حرکات کے جڑے دو یا زیادہ حروف۔", example:"مثال: ب ت ث"},
  {id:"jarra", term:"حروفِ جارہ", color:"var(--mustard)", def:"بامعنی گرامر کے حروف۔", example:"مثال: مِن، عَلٰی، اِلٰی"},
  {id:"nasiba", term:"حروفِ ناصبہ", color:"var(--rose)", def:"فعل کو نصب کرنے والے حروف۔", example:"مثال: لَنْ، کَیْ، اَنْ"}
];

const mcqs = [
  {q:"مفرد کسے کہتے ہیں؟", opts:["دو لفظوں کا مجموعہ","ایک لفظ جو ایک معنی دے","صرف حرف","مکمل جملہ"], correct:1,
   explain:"مفرد وہ اکیلا لفظ ہے جو ایک مکمل معنی بتائے، جیسے \"رسول\"۔"},
  {q:"\"قلم\" کس کی مثال ہے؟", opts:["مرکب","کلمہ (مفرد)","کلام","حرفِ ناصبہ"], correct:1,
   explain:"قلم اکیلا لفظ ہے جو ایک معنی دیتا ہے، اس لیے یہ کلمہ یعنی مفرد ہے۔"},
  {q:"\"زید قائم\" کس قسم کی مثال ہے؟", opts:["مفرد","مرکب حقیقتاً","مرکب حکماً","حرفِ جارہ"], correct:1,
   explain:"\"زید\" اور \"قائم\" دونوں لفظ ظاہری طور پر لکھے ہیں، اس لیے یہ حقیقتاً مرکب ہے۔"},
  {q:"\"اِعْلَمْ\" میں چھپی ضمیر کونسی ہے؟", opts:["ھُوَ","اَنْتَ","اَنَا","ھُم"], correct:1,
   explain:"\"اِعْلَمْ\" کا مطلب ہے \"تم جانو\"، اس میں فاعل \"اَنْتَ\" پوشیدہ (ضمیرِ مستتر) ہے۔"},
  {q:"مِن، عَلٰی، اِلٰی کس قسم کے حروف ہیں؟", opts:["حروفِ تہجی","حروفِ جارہ","حروفِ ناصبہ","ضمائر"], correct:1,
   explain:"یہ بامعنی گرامر کے حروف ہیں جنہیں حروفِ جارہ کہتے ہیں۔"}
];

const blanks = [
  {before:"مرکب کو ", answer:"کلام", after:" بھی کہتے ہیں۔", explain:"مرکب کا دوسرا نام کلام ہے۔"},
  {before:"اگر حروف پر حرکت لگ جائے تو وہ ", answer:"لفظ", after:" کہلاتے ہیں۔", explain:"حرکت لگنے کے بعد حروف مرکبات نہیں بلکہ لفظ کہلاتے ہیں۔"},
  {before:"لَنْ، کَیْ، اَنْ ", answer:"حروفِ ناصبہ", after:" کہلاتے ہیں۔", explain:"یہ فعل کو نصب کرنے والے حروف ہیں۔"},
  {before:"رسول ایک ", answer:"مفرد", after:" کی مثال ہے۔", explain:"رسول اکیلا لفظ ہے جو ایک معنی دیتا ہے، اس لیے یہ مفرد ہے۔"},
  {before:"بغیر حرکات کے جڑے حروف کو ", answer:"مرکبات", after:" کہتے ہیں۔", explain:"نورانی قاعدے میں بغیر حرکات حروف کے مجموعے کو مرکبات کہتے ہیں۔"}
];

/* ---------------- STATE ---------------- */
let masteredCount = 0;
let quizAnswered = 0;
const totalQuiz = mcqs.length + blanks.length;
let congratsShownCards = false;
let congratsShownQuiz = false;
let mcqScore = 0;
let blankScore = 0;

function updateMcqScoreDisplay(){
  document.getElementById('mcqScore').textContent = `Score: ${mcqScore} / ${mcqs.length}`;
}
function updateBlankScoreDisplay(){
  document.getElementById('blankScore').textContent = `Score: ${blankScore} / ${blanks.length}`;
}

/* ---------------- RENDER FLASHCARDS ---------------- */
const cardsGrid = document.getElementById('cardsGrid');
const indexChips = document.getElementById('indexChips');

flashcards.forEach(card => {
  const el = document.createElement('div');
  el.className = 'flashcard';
  el.id = 'card-' + card.id;
  el.dataset.term = card.term;
  el.innerHTML = `
    <div class="card-inner">
      <div class="card-face card-front" style="--c:${card.color}">
        <div class="term">${card.term}</div>
        <button class="flip-btn blink" style="--c:${card.color}">👆 ٹیپ کریں</button>
      </div>
      <div class="card-face card-back" style="--c:${card.color}">
        <div class="def">${card.def}</div>
        <div class="example">${card.example}</div>
        <div class="mastery-row">
          <button class="m-btn m-yes">✔ یاد ہے</button>
          <button class="m-btn m-no">↻ دوبارہ دیکھیں</button>
        </div>
      </div>
    </div>`;
  cardsGrid.appendChild(el);

  const chip = document.createElement('button');
  chip.className = 'chip';
  chip.textContent = card.term;
  chip.onclick = () => {
    document.getElementById('searchInput').value = '';
    filterCards('');
    el.scrollIntoView({behavior:'smooth', block:'center'});
    el.style.outline = '3px solid var(--rose)';
    setTimeout(()=> el.style.outline = 'none', 1200);
  };
  indexChips.appendChild(chip);

  const flipBtn = el.querySelector('.flip-btn');
  flipBtn.addEventListener('click', () => {
    el.classList.toggle('flipped');
    flipBtn.classList.remove('blink');
  });

  el.querySelector('.m-yes').addEventListener('click', (e) => {
    e.stopPropagation();
    if(!el.classList.contains('mastered')){
      el.classList.add('mastered');
      masteredCount++;
      updateCardProgress();
    }
  });
  el.querySelector('.m-no').addEventListener('click', (e) => {
    e.stopPropagation();
    if(el.classList.contains('mastered')){
      el.classList.remove('mastered');
      masteredCount--;
      updateCardProgress();
    }
    el.classList.remove('flipped');
  });
});

function updateCardProgress(){
  const pct = Math.round((masteredCount/flashcards.length)*100);
  document.getElementById('cardProgress').style.width = pct + '%';
  if(masteredCount === flashcards.length && !congratsShownCards){
    congratsShownCards = true;
    showCongrats('🎉 مبارک ہو!', 'آپ نے تمام '+flashcards.length+' فلیش کارڈز یاد کر لیے ہیں!');
  }
}

/* ---------------- RENDER MCQ ---------------- */
const mcqContainer = document.getElementById('mcqContainer');
mcqs.forEach((m, i) => {
  const box = document.createElement('div');
  box.className = 'quiz-box';
  box.dataset.term = m.q + ' ' + m.opts.join(' ');
  box.id = 'mcq-' + i;
  const optsHtml = m.opts.map((o, oi) =>
    `<button class="opt-btn" data-idx="${oi}">${o}</button>`
  ).join('');
  box.innerHTML = `
    <div class="q-text"><b>${i+1}.</b> ${m.q}</div>
    <ul class="opts">${optsHtml}</ul>
    <div class="explain"></div>`;
  mcqContainer.appendChild(box);

  const optBtns = box.querySelectorAll('.opt-btn');
  optBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      if(box.dataset.answered) return;
      box.dataset.answered = "1";
      const idx = parseInt(btn.dataset.idx);
      optBtns.forEach(b => b.disabled = true);
      let tag;
      if(idx === m.correct){
        btn.classList.add('correct');
        mcqScore++;
        tag = '<span class="score-tag right">✅ +1</span>';
      } else {
        btn.classList.add('wrong');
        optBtns[m.correct].classList.add('correct');
        tag = '<span class="score-tag wrong">❌ +0</span>';
      }
      updateMcqScoreDisplay();
      const ex = box.querySelector('.explain');
      ex.innerHTML = '💡 ' + m.explain + tag;
      ex.classList.add('show');
      quizAnswered++;
      updateQuizProgress();
    });
  });
});

/* ---------------- RENDER FILL-IN-BLANK ---------------- */
const blankContainer = document.getElementById('blankContainer');
blanks.forEach((b, i) => {
  const box = document.createElement('div');
  box.className = 'quiz-box';
  box.dataset.term = b.before + b.answer + b.after;
  box.id = 'blank-' + i;
  box.innerHTML = `
    <div class="q-text"><b>${i+1}.</b> ${b.before}<button class="blank-btn">؟ ٹیپ کریں</button>${b.after}</div>
    <div class="explain"></div>`;
  blankContainer.appendChild(box);

  const btn = box.querySelector('.blank-btn');
  btn.addEventListener('click', () => {
    if(btn.classList.contains('revealed')) return;
    btn.textContent = b.answer;
    btn.classList.add('revealed');
    blankScore++;
    updateBlankScoreDisplay();
    const ex = box.querySelector('.explain');
    ex.innerHTML = '💡 ' + b.explain + '<span class="score-tag done">✅ +1</span>';
    ex.classList.add('show');
    quizAnswered++;
    updateQuizProgress();
  });
});

function updateQuizProgress(){
  const pct = Math.round((quizAnswered/totalQuiz)*100);
  document.getElementById('quizProgress').style.width = pct + '%';
  if(quizAnswered === totalQuiz && !congratsShownQuiz){
    congratsShownQuiz = true;
    showCongrats('🏆 شاباش!', `آپ نے پوری مشق مکمل کر لی ہے۔ MCQ Score: ${mcqScore}/${mcqs.length} | Blanks: ${blankScore}/${blanks.length}`);
  }
}

/* ---------------- SEARCH FILTER ---------------- */
function filterCards(query){
  const q = query.trim();
  document.querySelectorAll('#cardsGrid .flashcard').forEach(el => {
    el.classList.toggle('hidden-by-search', q && !el.dataset.term.includes(q));
  });
  document.querySelectorAll('#mcqContainer .quiz-box, #blankContainer .quiz-box').forEach(el => {
    el.classList.toggle('hidden-by-search', q && !el.dataset.term.includes(q));
  });
}
document.getElementById('searchInput').addEventListener('input', (e) => filterCards(e.target.value));

/* ---------------- CONGRATS + CONFETTI ---------------- */
function showCongrats(title, text){
  document.getElementById('congratsTitle').textContent = title;
  document.getElementById('congratsText').textContent = text;
  document.getElementById('overlay').classList.add('show');
  launchConfetti();
}
function closeOverlay(){
  document.getElementById('overlay').classList.remove('show');
}
function launchConfetti(){
  const colors = ['#e0654a','#1f8a83','#e2a530','#8a6bb0','#c9506b','#3aa66b'];
  for(let i=0;i<50;i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random()*100 + 'vw';
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration = (2 + Math.random()*1.5) + 's';
    c.style.opacity = 0.9;
    document.body.appendChild(c);
    setTimeout(()=> c.remove(), 4000);
  }
}
</script>
